<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gaming Tournament Registration</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:40px;
background:linear-gradient(135deg,#090909,#111827,#1f1147,#000000);
background-size:400% 400%;
animation:bg 10s ease infinite;
}

@keyframes bg{

0%{
background-position:0% 50%;
}

50%{
background-position:100% 50%;
}

100%{
background-position:0% 50%;
}

}

.container{

width:950px;
max-width:100%;
padding:35px;
border-radius:20px;
background:rgba(255,255,255,.08);
backdrop-filter:blur(14px);
box-shadow:0 0 40px rgba(0,255,255,.2);
border:1px solid rgba(255,255,255,.15);

}

h1{

text-align:center;
color:white;
font-size:36px;
margin-bottom:30px;
letter-spacing:2px;
text-shadow:0 0 15px cyan;

}

label{

display:block;
margin-bottom:8px;
color:#fff;
font-weight:bold;

}

input,
select{

width:100%;
padding:14px;
margin-bottom:18px;
border:none;
border-radius:12px;
font-size:15px;
background:rgba(255,255,255,.12);
color:white;
outline:none;
transition:.3s;

}

input::placeholder{

color:#d0d0d0;

}

input:focus,
select:focus{

background:rgba(255,255,255,.2);
box-shadow:0 0 15px cyan;

}

button{

padding:13px 22px;
border:none;
border-radius:12px;
cursor:pointer;
font-size:15px;
font-weight:bold;
margin-right:10px;
margin-top:8px;
color:white;
background:linear-gradient(45deg,#00c6ff,#0072ff);
transition:.3s;

}

button:hover{

transform:translateY(-3px);
box-shadow:0 0 20px cyan;

}

button:active{

transform:scale(.96);

}

hr{

margin:28px 0;
border:none;
height:2px;
background:rgba(255,255,255,.2);

}

#count{

display:inline-block;
margin-top:15px;
padding:12px 18px;
border-radius:10px;
font-weight:bold;
color:white;
background:linear-gradient(45deg,#7b2ff7,#f107a3);

}

table{
    width:100%;
    margin-top:25px;
    border-collapse:collapse;
    overflow:hidden;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,255,255,.2);
}

th{
    background:linear-gradient(45deg,#00c6ff,#0072ff);
    color:white;
    padding:14px;
    font-size:16px;
    letter-spacing:1px;
}

td{
    padding:14px;
    text-align:center;
    color:white;
    border-bottom:1px solid rgba(255,255,255,.15);
}

tr:nth-child(even){
    background:rgba(255,255,255,.06);
}

tr:hover{
    background:rgba(0,255,255,.15);
    transition:.3s;
}

#message{
    margin-top:20px;
    padding:14px;
    border-radius:10px;
    color:white;
    font-weight:bold;
    background:rgba(255,255,255,.08);
    border-left:5px solid cyan;
    box-shadow:0 0 15px rgba(0,255,255,.2);
}

::-webkit-scrollbar{
    width:8px;
}

::-webkit-scrollbar-thumb{
    background:#00c6ff;
    border-radius:10px;
}

@media(max-width:768px){

.container{
    padding:20px;
}

h1{
    font-size:28px;
}

button{
    width:100%;
    margin-bottom:10px;
}

table{
    display:block;
    overflow-x:auto;
}

}

</style>
</head>

<body>

<div class="container">

<h1>🎮 Gaming Tournament Registration</h1>

<label>Player Name</label>
<input type="text" id="playerName" placeholder="Enter Player Name">

<label>Game Name</label>

<select id="gameName">
<option>BGMI</option>
<option>Free Fire MAX</option>
<option>Valorant</option>
<option>Call of Duty Mobile</option>
<option>EA FC 26</option>
<option>Minecraft</option>
</select>

<label>Team Name</label>
<input type="text" id="teamName" placeholder="Enter Team Name">

<label>Registration Status</label>

<select id="status">
<option>Registered</option>
<option>Pending</option>
</select>

<button onclick="addPlayer()">Register Player</button>

<hr>

<label>Search Player</label>

<input type="text" id="searchPlayer" placeholder="Enter Player Name">

<button onclick="searchPlayer()">Search</button>

<h3 id="count">Total Players : 0</h3>

<table>

<tr>
<th>Player</th>
<th>Game</th>
<th>Team</th>
<th>Status</th>
</tr>

<tbody id="tableData">

</tbody>

</table>

<p id="message"></p>

</div>

<script>

let players=[];

function addPlayer(){

let player=document.getElementById("playerName").value;
let game=document.getElementById("gameName").value;
let team=document.getElementById("teamName").value;
let status=document.getElementById("status").value;

if(player=="" || team==""){
alert("Please Fill All Details");
return;
}

let data={
player:player,
game:game,
team:team,
status:status
};

players.push(data);

showPlayers();

document.getElementById("playerName").value="";
document.getElementById("teamName").value="";
document.getElementById("gameName").value="BGMI";
document.getElementById("status").value="Registered";

}

function showPlayers(){

let text="";

for(let i=0;i<players.length;i++){

text=text+"<tr>";

text=text+"<td>"+players[i].player+"</td>";

text=text+"<td>"+players[i].game+"</td>";

text=text+"<td>"+players[i].team+"</td>";

if(players[i].status=="Registered"){

text=text+"<td style='color:#00ff66;font-weight:bold;'>"+players[i].status+"</td>";

}
else{

text=text+"<td style='color:#ff4d4d;font-weight:bold;'>"+players[i].status+"</td>";

}

text=text+"</tr>";

}

document.getElementById("tableData").innerHTML=text;

document.getElementById("count").innerHTML="Total Players : "+players.length;

}

function searchPlayer(){

let search=document.getElementById("searchPlayer").value;

let found=false;

for(let i=0;i<players.length;i++){

if(players[i].player.toLowerCase()==search.toLowerCase()){

document.getElementById("message").innerHTML=
"🎮 Player Found : <b>"+players[i].player+
"</b> | Game : <b>"+players[i].game+
"</b> | Team : <b>"+players[i].team+
"</b> | Status : <b>"+players[i].status+"</b>";

found=true;

}

}

if(found==false){

document.getElementById("message").innerHTML=
"❌ Player Not Found";

}

}

</script>

</body>
</html>
